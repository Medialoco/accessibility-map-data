name: Build & publish PMTiles (Acceslibre France)

# Construit les tuiles PMTiles France entiere depuis l'export CSV ouvert
# d'Acceslibre (data.gouv.fr, sans cle) puis les publie sur GitHub Pages de CE
# depot. Servir depuis Pages (meme origine medialoco.github.io que le site) evite
# tout probleme de CORS et supporte les requetes Range necessaires a PMTiles.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1" # chaque lundi 03:17 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j
          sudo make -C /tmp/tippecanoe install

      - name: Install deps
        run: npm install

      - name: Fetch Acceslibre (France entière, CSV)
        run: node src/fetch-csv.mjs out/acceslibre.geojson

      # Tuiles allegees (< 100 Mo pour Pages) : on ne garde que les attributs
      # utiles a la carte, aux filtres, a la fiche et au deep-link.
      # Vraies grappes uniformes aux zooms bas (comme acceslibre.beta.gouv.fr) :
      # --cluster-distance fusionne les points proches en une feature portant
      # `point_count`. Le zoom max eleve (-z 16 + extend) garantit un DECLUSTERING
      # COMPLET : au zoom rue les grappes se separent jusqu'aux nodes individuels
      # (ceux sans point_count), la ou l'utilisateur bascule en 3D.
      # --drop-densest-as-needed reste un filet de securite aux zooms bas ;
      # --extend-zooms-if-still-dropping ajoute des zooms pour ne pas perdre de
      # points en zone tres dense (Paris).
      - name: Build PMTiles (grappes + declustering complet)
        run: |
          mkdir -p site
          tippecanoe -o site/acceslibre.pmtiles --force \
            -l acceslibre -n "Acceslibre" \
            --attribution "Acceslibre (Étalab 2.0)" \
            -Z 3 -z 16 \
            --cluster-distance=60 \
            --accumulate-attribute=point_count:sum \
            --drop-densest-as-needed \
            -y nom -y activite -y commune \
            -y wheelchairEntrance -y stepFreeEntrance -y accessibleParking \
            -y adaptedToilets -y audioBeacon -y guidePath \
            -y hearingEquipment -y publicTransport \
            out/acceslibre.geojson
          ls -lh site/acceslibre.pmtiles
          touch site/.nojekyll
          echo "Tuiles Acceslibre - voir accessibility-map-fr" > site/index.html

      - name: Fail if tiles exceed Pages limit (100 MB)
        run: |
          SIZE=$(stat -c%s site/acceslibre.pmtiles)
          echo "Taille tuiles: $SIZE octets"
          if [ "$SIZE" -ge 104857600 ]; then
            echo "::error::PMTiles >= 100 Mo, non servable par Pages. Reduire les attributs/zoom."
            exit 1
          fi

      # Jeu de points COMPACT (colonnaire) pour le clustering cote client :
      # permet aux filtres d'accessibilite de recomposer les grappes en direct.
      - name: Build compact points (clustering client)
        run: |
          node src/build-points.mjs out/acceslibre.geojson site/acceslibre-points.json
          ls -lh site/acceslibre-points.json
          SIZE=$(stat -c%s site/acceslibre-points.json)
          echo "Taille points: $SIZE octets"
          if [ "$SIZE" -ge 104857600 ]; then
            echo "::error::Points >= 100 Mo, non servable par Pages. Reduire les attributs."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
